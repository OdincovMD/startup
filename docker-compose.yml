services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: labportal_nginx
    env_file:
      - .env
    ports:
      - "${NGINX_PORT}:${NGINX_PORT}"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - BACKEND_URL=${BACKEND_URL}
    container_name: labportal_frontend
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    expose:
      - "${FRONTEND_PORT}"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: labportal_backend
    env_file:
      - .env
    environment:
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL}
      - LOG_FILE_PATH=/app/logs/app.log
    expose:
      - "${BACKEND_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT}/health"]
      interval: 20s
      timeout: 5s
      retries: 2
      start_period: 3s
    networks:
      - app-network
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
    volumes:
      - ./backend:/app
      - ./logs:/app/logs

  postgres:
    image: postgres:16-alpine
    container_name: labportal_db
    restart: always
    shm_size: 128mb
    env_file:
      - .env
    expose:
      - "5432"
    ports:
      - "${DB_PORT_HOST}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: labportal_elasticsearch
    env_file:
      - .env
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ports:
      - "${ELASTICSEARCH_PORT_HOST}:${ELASTICSEARCH_PORT}"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      # Пороги по диску (high=99%) заданы в конфиге, чтобы при ~97% занятости кластер не уходил в RED
      - ./elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:${ELASTICSEARCH_PORT}/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  minio:
    image: minio/minio:latest
    container_name: labportal_minio
    env_file:
      - .env
    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    ports:
      - "${MINIO_PORT_HOST}:${MINIO_PORT}"
      - "${MINIO_CONSOLE_PORT_HOST}:${MINIO_CONSOLE_PORT}"
    volumes:
      - minio_data:/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  elasticsearch_data:
  minio_data: